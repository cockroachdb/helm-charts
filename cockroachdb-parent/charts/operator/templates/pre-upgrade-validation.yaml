{{- if .Release.IsUpgrade }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-operator-pre-upgrade-validation"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: operator-pre-upgrade-validation
    spec:
      serviceAccountName: cockroach-operator-default
      restartPolicy: Never
      containers:
        - name: pre-upgrade-check
          image: dtzar/helm-kubectl:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              #!/bin/bash
              set -e

              RELEASE_NAME="{{ .Release.Name }}"
              RELEASE_NAMESPACE="{{ .Release.Namespace }}"

              echo "=========================================="
              echo "  Operator Pre-Upgrade Validation"
              echo "=========================================="
              echo "Release: $RELEASE_NAME"
              echo "Namespace: $RELEASE_NAMESPACE"
              echo ""
              
              rm -rf ~/.kube/cache ~/.kube/http-cache 2>/dev/null || true

              if ! kubectl get crd crdbclusters.crdb.cockroachlabs.com &>/dev/null; then
                echo "✅ Fresh installation - no validation needed"
                exit 0
              fi

              STORED_VERSIONS=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com \
                -o jsonpath='{.status.storedVersions}' 2>/dev/null || echo "[]")
              V1BETA1_SERVED=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com \
                -o jsonpath='{.spec.versions[?(@.name=="v1beta1")].served}' 2>/dev/null || echo "false")
              V1BETA1_STORAGE=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com \
                -o jsonpath='{.spec.versions[?(@.name=="v1beta1")].storage}' 2>/dev/null || echo "false")
              V1ALPHA1_SERVED=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com \
                -o jsonpath='{.spec.versions[?(@.name=="v1alpha1")].served}' 2>/dev/null || echo "not-found")

              echo "storedVersions: $STORED_VERSIONS"
              echo "v1beta1 served: $V1BETA1_SERVED"
              echo "v1beta1 storage: $V1BETA1_STORAGE"
              echo "v1alpha1 served: $V1ALPHA1_SERVED"
              echo ""

              if [ "$V1BETA1_SERVED" != "true" ] || [ "$V1BETA1_STORAGE" != "true" ]; then
                echo "❌ UPGRADE BLOCKED - v1beta1 is not fully enabled"
                echo ""
                echo "This upgrade requires the previous release where v1beta1 is both served and storage."
                echo "Upgrade path:"
                echo "  1. Upgrade operator to the previous release"
                echo "  2. Verify v1beta1 is served and storage"
                echo "  3. Retry this operator upgrade"
                exit 1
              fi

              if [[ "$STORED_VERSIONS" != '["v1beta1"]' ]]; then
                echo "❌ UPGRADE BLOCKED - storedVersions must be [\"v1beta1\"]"
                echo ""
                echo "This upgrade requires the previous release to have completed storage migration."
                echo "Current storedVersions: $STORED_VERSIONS"
                echo ""
                echo "Upgrade path:"
                echo "  1. Upgrade operator to the previous release"
                echo "  2. Verify: kubectl get crd crdbclusters.crdb.cockroachlabs.com -o jsonpath='{.status.storedVersions}'"
                echo "  3. Retry this operator upgrade"
                exit 1
              fi

              if ! kubectl get crdbclusters.v1beta1.crdb.cockroachlabs.com -A &>/dev/null; then
                echo "❌ Cannot access v1beta1 API"
                exit 1
              fi

              echo "✅ All checks passed"
  backoffLimit: 3
{{- end }}
