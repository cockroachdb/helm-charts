{{- if .Release.IsUpgrade }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "cockroachdb.fullname" . }}-pre-upgrade-validation"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: pre-upgrade-validation
    spec:
      serviceAccountName: {{ include "cockroachdb.serviceAccount.name" . }}
      restartPolicy: Never
      containers:
        - name: validation
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=========================================="
              echo "  CockroachDB Pre-Upgrade Validation"
              echo "=========================================="
              echo ""

              if ! kubectl get crd crdbclusters.crdb.cockroachlabs.com &>/dev/null; then
                echo "UPGRADE BLOCKED - CRD not found"
                echo ""
                echo "Operator must be installed first."
                exit 1
              fi

              V1BETA1_SERVED=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com -o jsonpath='{.spec.versions[?(@.name=="v1beta1")].served}' 2>/dev/null || echo "false")
              V1BETA1_STORAGE=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com -o jsonpath='{.spec.versions[?(@.name=="v1beta1")].storage}' 2>/dev/null || echo "false")
              STORED_VERSIONS=$(kubectl get crd crdbclusters.crdb.cockroachlabs.com -o jsonpath='{.status.storedVersions}' 2>/dev/null || echo "[]")

              echo "v1beta1 served: $V1BETA1_SERVED"
              echo "v1beta1 storage: $V1BETA1_STORAGE"
              echo "storedVersions: $STORED_VERSIONS"
              echo ""

              if [ "$V1BETA1_SERVED" != "true" ] || [ "$V1BETA1_STORAGE" != "true" ]; then
                echo "UPGRADE BLOCKED - v1beta1 is not served or not the storage version"
                echo ""
                echo "Upgrade operator first to enable v1beta1."
                exit 1
              fi

              if ! echo "$STORED_VERSIONS" | grep -q '"v1beta1"'; then
                echo "UPGRADE BLOCKED - v1beta1 not in storedVersions"
                echo ""
                echo "Current storedVersions: $STORED_VERSIONS"
                echo "Upgrade operator first to complete storage migration."
                exit 1
              fi

              {{- if .Values.migration.enabled }}
              CLUSTER_NAME="{{ include "cockroachdb.fullname" . }}"
              if ! kubectl get crdbclusters.v1beta1.crdb.cockroachlabs.com "$CLUSTER_NAME" -n {{ .Release.Namespace }} &>/dev/null; then
                echo "UPGRADE BLOCKED - Migrated v1beta1 CrdbCluster '$CLUSTER_NAME' not found"
                echo ""
                echo "Complete migration before adopting the CockroachDB chart."
                exit 1
              fi
              {{- end }}

              echo "All checks passed"
  backoffLimit: 3
{{- end }}
