name: integration-tests

on:
  # Run integration tests nightly only on master branch
  schedule:
    - cron: "15 6 * * *"  # Run at 6:15 AM UTC to avoid peak times
  # Allow manual trigger on any branch
  workflow_dispatch:
    
jobs:
  integration-tests:
    # For scheduled runs, only run on master branch
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest-x64-8-core
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        id: auth
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Run tests
        env:
          isNightly: true
        run: make test/nightly-e2e/singleRegion